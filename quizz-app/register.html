<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>
<link rel="stylesheet" href="styles/main.css">
</head>

<body>
<div class="container auth-card">
<h2>Register</h2>

<input id="username" placeholder="Username" autocomplete="username"><br>
<input id="password" type="password" placeholder="Password" autocomplete="new-password"><br>

<div id="message" class="message" aria-live="polite"></div>

<button id="registerBtn" onclick="register()">Register</button>
<a href="login.html">Login</a>
<a href="index.html">Back</a>

</div>

<script>
function showMessage(text, type){
    const box = document.getElementById("message");
    box.textContent = text;
    box.className = `message ${type}`;
}

function register(){
    const button = document.getElementById("registerBtn");
    button.disabled = true;
    showMessage("Creating your account...", "info");

    fetch("php/register.php", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(async r=>{
        const data = await r.json().catch(()=>({success:false, message:"Registration failed."}));
        if(!r.ok || !data.success) throw data;
        return data;
    })
    .then(data=>{
        showMessage(data.message || "Successfully registered. Redirecting...", "success");
        setTimeout(()=> window.location="index.html", 900);
    })
    .catch(err=>{
        showMessage(err.message || "Could not register. Please try again.", "error");
        button.disabled = false;
    });
}
</script>

</body>
</html>

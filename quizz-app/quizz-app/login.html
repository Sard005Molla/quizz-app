<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styles/main.css">
</head>

<body>
<div class="container auth-card">
<h2>Login</h2>

<input id="username" placeholder="Username" autocomplete="username"><br>
<input id="password" type="password" placeholder="Password" autocomplete="current-password"><br>

<div id="message" class="message" aria-live="polite"></div>

<button id="loginBtn" onclick="login()">Login</button>
<a href="register.html">Register</a>
<a href="index.html">Back</a>

</div>

<script>
function showMessage(text, type){
    const box = document.getElementById("message");
    box.textContent = text;
    box.className = `message ${type}`;
}

function login(){
    const button = document.getElementById("loginBtn");
    button.disabled = true;
    showMessage("Checking your account...", "info");

    fetch("php/login.php", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(async r=>{
        const data = await r.json().catch(()=>({success:false, message:"Login failed."}));
        if(!r.ok || !data.success) throw data;
        return data;
    })
    .then(data=>{
        showMessage(data.message || "Successfully logged in. Redirecting...", "success");
        setTimeout(()=> window.location="index.html", 900);
    })
    .catch(err=>{
        showMessage(err.message || "Could not log in. Please try again.", "error");
        button.disabled = false;
    });
}
</script>

</body>
</html>
